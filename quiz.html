<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prep Quiz Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5; /* Tech-focused indigo */
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --success: #10B981;
            --danger: #EF4444;
            --border: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Scoreboard Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-weight: bold;
        }
        
        .stat-correct { color: var(--success); }
        .stat-wrong { color: var(--danger); }
        .stat-accuracy { color: var(--primary); }

        /* Card Containers */
        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h2 { margin-bottom: 15px; color: var(--text-main); }
        p { margin-bottom: 20px; color: var(--text-muted); }

        /* Buttons */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9CA3AF; cursor: not-allowed; }

        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background-color: var(--primary);
            color: white;
        }

        /* File Upload */
        input[type="file"] {
            display: block;
            margin-bottom: 20px;
            padding: 10px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            width: 100%;
        }

        /* Quiz Layout */
        .topic-badge {
            display: inline-block;
            background: #EEF2FF;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 25px;
            word-wrap: break-word; /* Handles lengthy questions */
        }

        /* Options */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            word-wrap: break-word;
        }

        .option-label:hover {
            border-color: var(--primary);
            background-color: #F9FAFB;
        }

        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
        }

        /* Feedback */
        .feedback {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none; /* Hidden by default */
        }
        .feedback.correct {
            background-color: #D1FAE5;
            color: #065F46;
            border: 1px solid #34D399;
            display: block;
        }
        .feedback.wrong {
            background-color: #FEE2E2;
            color: #991B1B;
            border: 1px solid #F87171;
            display: block;
        }

        /* Sections */
        #category-selection, #quiz-section {
            display: none;
        }

        .cat-buttons {
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header" id="scoreboard" style="display: none;">
        <h2>Prep Tracker</h2>
        <div class="stats">
            <span class="stat-correct">Correct: <span id="score-correct">0</span></span>
            <span class="stat-wrong">Wrong: <span id="score-wrong">0</span></span>
            <span class="stat-accuracy">Accuracy: <span id="score-accuracy">0%</span></span>
        </div>
    </div>

    <div class="card" id="upload-section">
        <h2>Welcome! Let's get started.</h2>
        <p>Please upload your Excel file containing the questions. Ensure the sheets are named "cat 1" and "cat 2".</p>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <button onclick="processFile()">Load Questions</button>
        <p id="upload-error" style="color: var(--danger); margin-top: 10px; display: none;"></p>
    </div>

    <div class="card" id="category-selection">
        <h2>Select a Category</h2>
        <p>Which topic would you like to practice right now?</p>
        <div class="cat-buttons">
            <button class="btn-outline" onclick="startQuiz('cat 1')">Category 1</button>
            <button class="btn-outline" onclick="startQuiz('cat 2')">Category 2</button>
            <button class="btn-outline" onclick="startQuiz('mixed')">Mix Both</button>
        </div>
    </div>

    <div class="card" id="quiz-section">
        <div class="topic-badge" id="q-topic">Topic Name</div>
        <div class="question-text" id="q-text">Question text goes here?</div>
        
        <div class="options-grid" id="q-options">
            </div>

        <div id="feedback-box" class="feedback"></div>

        <div style="display: flex; gap: 15px;">
            <button id="btn-submit" onclick="checkAnswer()">Submit Answer</button>
            <button id="btn-next" onclick="loadNextQuestion()" style="display: none;" class="btn-outline">Next Question &rarr;</button>
            <button id="btn-back" onclick="goBackToCategories()" style="background-color: #6B7280;">Change Category</button>
        </div>
    </div>
</div>

<script>
    // App State Variables
    let quizData = { 'cat 1': [], 'cat 2': [] };
    let activeCategory = ''; // 'cat 1', 'cat 2', or 'mixed'
    let currentQuestion = null;
    
    let stats = { correct: 0, wrong: 0, total: 0 };

    // --- File Processing Logic ---
    function processFile() {
        const fileInput = document.getElementById('excel-file');
        const errorMsg = document.getElementById('upload-error');
        
        if (!fileInput.files.length) {
            errorMsg.textContent = "Please select a file first.";
            errorMsg.style.display = 'block';
            return;
        }

        const file = fileInput.files;
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                // Try to find sheets by exact name, or fallback to first two sheets
                const sheetNames = workbook.SheetNames;
                const sheet1Name = sheetNames.find(n => n.toLowerCase().trim() === 'cat 1') || sheetNames;
                const sheet2Name = sheetNames.find(n => n.toLowerCase().trim() === 'cat 2') || (sheetNames.length > 1 ? sheetNames : null);

                // Convert sheets to JSON
                quizData['cat 1'] = XLSX.utils.sheet_to_json(workbook.Sheets[sheet1Name]);
                if (sheet2Name) {
                    quizData['cat 2'] = XLSX.utils.sheet_to_json(workbook.Sheets[sheet2Name]);
                }

                // Check if data was found
                if (quizData['cat 1'].length === 0 && quizData['cat 2'].length === 0) {
                    throw new Error("No data found in the sheets.");
                }

                // Transition UI
                document.getElementById('upload-section').style.display = 'none';
                document.getElementById('category-selection').style.display = 'block';
                document.getElementById('scoreboard').style.display = 'flex';

            } catch (err) {
                errorMsg.textContent = "Error parsing file. Ensure it's a valid Excel file with the correct column names.";
                errorMsg.style.display = 'block';
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // --- Quiz Logic ---
    function startQuiz(category) {
        activeCategory = category;
        document.getElementById('category-selection').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadNextQuestion();
    }

    function goBackToCategories() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('category-selection').style.display = 'block';
    }

    function loadNextQuestion() {
        // Reset UI
        document.getElementById('feedback-box').className = 'feedback';
        document.getElementById('feedback-box').innerHTML = '';
        document.getElementById('btn-submit').style.display = 'inline-block';
        document.getElementById('btn-next').style.display = 'none';

        // Select array based on category
        let pool = [];
        if (activeCategory === 'mixed') {
            pool = [...quizData['cat 1'], ...quizData['cat 2']];
        } else {
            pool = quizData[activeCategory];
        }

        if (pool.length === 0) {
            alert("No questions available in this category.");
            goBackToCategories();
            return;
        }

        // Pick random question
        const randomIndex = Math.floor(Math.random() * pool.length);
        currentQuestion = pool[randomIndex];

        // Ensure keys exist (handling potential trailing spaces in Excel headers)
        const qText = currentQuestion['Question'] || currentQuestion['Question '] || "No question text found";
        const qTopic = currentQuestion['Topic'] || currentQuestion['Topic '] || "General";
        
        const optA = currentQuestion['Option A'] || currentQuestion['Option A '];
        const optB = currentQuestion['Option B'] || currentQuestion['Option B '];
        const optC = currentQuestion['Option C'] || currentQuestion['Option C '];
        const optD = currentQuestion['Option D'] || currentQuestion['Option D '];

        // Update DOM
        document.getElementById('q-topic').textContent = qTopic;
        document.getElementById('q-text').textContent = qText;

        const optionsGrid = document.getElementById('q-options');
        optionsGrid.innerHTML = ''; // Clear previous options

        // Build option HTML
        const optionsMap = { 'A': optA, 'B': optB, 'C': optC, 'D': optD };
        
        for (const [key, value] of Object.entries(optionsMap)) {
            if (value) { // Only render if the option exists in the Excel sheet
                const label = document.createElement('label');
                label.className = 'option-label';
                label.innerHTML = `
                    <input type="radio" name="quiz-option" value="${key}">
                    <span><strong>${key}:</strong> ${value}</span>
                `;
                optionsGrid.appendChild(label);
            }
        }
    }

    function checkAnswer() {
        const selectedOption = document.querySelector('input[name="quiz-option"]:checked');
        const feedbackBox = document.getElementById('feedback-box');
        
        if (!selectedOption) {
            alert("Please select an option first!");
            return;
        }

        const userAnswer = selectedOption.value; // "A", "B", "C", or "D"
        
        // Handle potential exact matches or whitespace in Excel data
        let correctAnswerRaw = currentQuestion['Correct Answer'] || currentQuestion['Correct Answer '] || "";
        const correctAnswer = correctAnswerRaw.toString().trim().toUpperCase();

        // Get the text of the actual correct answer to display it
        const correctAnswerTextKey = 'Option ' + correctAnswer;
        const correctAnswerText = currentQuestion[correctAnswerTextKey] || currentQuestion[correctAnswerTextKey + ' '];

        stats.total++;

        if (userAnswer === correctAnswer) {
            // Correct
            stats.correct++;
            feedbackBox.className = 'feedback correct';
            feedbackBox.innerHTML = `<strong>Correct!</strong> Great job.`;
        } else {
            // Wrong
            stats.wrong++;
            feedbackBox.className = 'feedback wrong';
            feedbackBox.innerHTML = `<strong>Incorrect.</strong> The correct answer is <strong>${correctAnswer}</strong>: ${correctAnswerText}`;
        }

        // Disable all radio buttons
        const radios = document.querySelectorAll('input[name="quiz-option"]');
        radios.forEach(radio => radio.disabled = true);

        // Update scoreboard
        updateScoreboard();

        // Swap buttons
        document.getElementById('btn-submit').style.display = 'none';
        document.getElementById('btn-next').style.display = 'inline-block';
    }

    function updateScoreboard() {
        document.getElementById('score-correct').textContent = stats.correct;
        document.getElementById('score-wrong').textContent = stats.wrong;
        
        const accuracy = stats.total === 0 ? 0 : Math.round((stats.correct / stats.total) * 100);
        document.getElementById('score-accuracy').textContent = accuracy + '%';
    }
</script>

</body>
</html>
